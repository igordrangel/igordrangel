@if (details()) {
  <app-dropdown class="tag-chip-dropdown">
    <span
      trigger
      [class]="chipClass()"
      [attr.aria-label]="label() + '. Abrir detalhes.'"
    >
      {{ label() }}
      <i class="fa-solid fa-circle-info shrink-0 text-[0.65rem] opacity-60" aria-hidden="true"></i>
    </span>

    <div options class="w-72 max-w-[min(20rem,calc(100vw-2rem))] p-3">
      <p class="text-left text-xs leading-relaxed text-neutral-300">{{ details() }}</p>
    </div>
  </app-dropdown>
} @else {
  <span [class]="chipClass()">{{ label() }}</span>
}
