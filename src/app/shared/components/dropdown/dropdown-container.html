@let anchorName = '--anchor-' + id;

<button
  #dropdownTrigger
  type="button"
  class="p-0! w-full"
  tabindex="0"
  role="button"
  [attr.popovertarget]="id"
  [style.anchor-name]="anchorName"
  [disabled]="disabled()"
  (click)="ajustPosition()"
>
  <ng-content select="[trigger]" />
</button>

<div
  #dropdownContent
  tabindex="0"
  popover
  [id]="id"
  [style.position-anchor]="anchorName"
  class="dropdown menu p-0 bg-base-100 rounded-box mt-3 w-auto min-w-[calc(100%-1rem)] max-w-[calc(100vw-1rem)] lg:min-w-auto max-h-55 shadow-sm border-2 border-base-300 rounded-md overflow-y-auto"
>
  <ng-content select="[options]" />
</div>
