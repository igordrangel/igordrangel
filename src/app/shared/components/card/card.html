<div class="card border border-base-300 bg-base-100/80 backdrop-blur-sm">
  <figure
    class="relative w-full overflow-hidden"
    [class]="compact() ? 'h-36 sm:h-40' : 'h-48 sm:h-56 md:h-72'"
  >
    <app-loading-image
      [src]="thumbnail()"
      [alt]="label()"
      fill
      fit="cover"
    />
  </figure>

  <div class="card-body" [class.p-4]="compact()">
    <h2 class="card-title" [class.text-base]="compact()">{{ label() }}</h2>
    <p [class.text-sm]="compact()">{{ description() }}</p>

    <div class="card-actions flex-wrap items-center justify-end empty:hidden">
      <ng-content select="[actions]" />
    </div>
  </div>
</div>
