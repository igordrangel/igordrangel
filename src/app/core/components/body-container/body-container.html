<main class="mx-auto flex max-w-full flex-col overflow-x-hidden lg:max-w-260">
  @if (showScrollToTop()) {
    <button
      class="fixed right-4 bottom-4 z-10 sm:right-10 sm:bottom-10"
      appButton
      btnCircle
      btnSoft
      btnVariant="primary"
      type="button"
      (click)="scrollToTop()"
    >
      <i class="fa-solid fa-angle-up"></i>
    </button>
  }

  <ng-content />
</main>
