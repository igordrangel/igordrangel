<article class="flex w-full flex-col items-center gap-6 px-4 sm:gap-8">
  <app-section-header title="SaaS em destaque" titleDelay="4" />

  <div
    appReveal
    class="motion-delay-5 w-full max-w-4xl overflow-hidden rounded-2xl border border-primary/30 bg-base-100/80 shadow-lg shadow-primary/10 backdrop-blur-sm transition-[transform,box-shadow,border-color] duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] hover:-translate-y-0.5 hover:border-primary/45 hover:shadow-[0_24px_48px_-12px] hover:shadow-primary/20 motion-reduce:hover:translate-y-0 lg:grid lg:grid-cols-2"
  >
    <figure
      class="relative flex min-h-48 w-full items-center justify-center overflow-hidden border-b border-base-300 bg-base-200/20 p-4 sm:min-h-56 lg:min-h-80 lg:border-b-0 lg:border-r"
    >
      <app-loading-image
        [src]="saas().thumbnail"
        [alt]="saas().label"
        fill
        fit="contain"
        fadeDuration="500"
        skeletonClass="absolute inset-4 rounded-lg"
        imgClass="object-center p-4"
      />
    </figure>

    <div class="flex flex-col justify-center gap-3 p-4 sm:gap-4 sm:p-6 lg:p-8">
      <span class="badge badge-primary w-fit">SaaS</span>
      <h3 class="text-xl font-bold sm:text-2xl">{{ saas().label }}</h3>
      <p class="text-sm text-neutral-400 sm:text-base">{{ saas().description }}</p>

      @if (saas().siteUrl) {
        <div class="pt-1 sm:pt-2">
          <a
            appButton
            btnVariant="primary"
            btnSize="sm"
            class="w-full transition-transform duration-300 ease-out hover:scale-[1.02] active:scale-[0.98] sm:w-auto"
            [attr.href]="saas().siteUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            Acessar plataforma
            <i class="fa-solid fa-arrow-up-long rotate-45 text-[0.6rem] opacity-70"></i>
          </a>
        </div>
      }
    </div>
  </div>
</article>
