<article class="flex w-full flex-col items-center gap-8 px-4">
  <h2
    class="motion-reveal motion-delay-4 text-3xl font-bold px-4 pb-1 border-b-4 border-neutral-200"
  >
    SaaS em destaque
  </h2>

  <div
    class="motion-reveal motion-delay-5 w-full max-w-4xl overflow-hidden rounded-2xl border border-primary/30 bg-base-100/80 shadow-lg shadow-primary/10 backdrop-blur-sm transition-[transform,box-shadow,border-color] duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] hover:-translate-y-0.5 hover:border-primary/45 hover:shadow-[0_24px_48px_-12px] hover:shadow-primary/20 motion-reduce:hover:translate-y-0 lg:grid lg:grid-cols-2"
  >
    <figure
      class="relative flex min-h-56 w-full items-center justify-center border-b border-base-300 bg-base-200/20 p-4 lg:min-h-80 lg:border-b-0 lg:border-r"
    >
      @if (thumbnailIsLoading()) {
        <app-skeleton variant="rect" class="absolute inset-4 rounded-lg" />
      }

      <img
        class="relative max-h-full max-w-full object-contain object-center transition-opacity duration-500 ease-out"
        [class.opacity-0]="thumbnailIsLoading()"
        [ngSrc]="saas().thumbnail"
        [attr.alt]="saas().label"
        width="1024"
        height="564"
        (load)="thumbnailIsLoading.set(false)"
      />
    </figure>

    <div class="flex flex-col justify-center gap-4 p-6 lg:p-8">
      <span class="badge badge-primary w-fit">SaaS</span>
      <h3 class="text-2xl font-bold">{{ saas().label }}</h3>
      <p class="text-neutral-400">{{ saas().description }}</p>

      @if (saas().siteUrl) {
        <div class="pt-2">
          <a
            appButton
            btnVariant="primary"
            btnSize="sm"
            class="transition-transform duration-300 ease-out hover:scale-[1.02] active:scale-[0.98]"
            [attr.href]="saas().siteUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            Acessar plataforma
            <i class="fa-solid fa-arrow-up-long opacity-70 rotate-45 text-[0.6rem]"></i>
          </a>
        </div>
      }
    </div>
  </div>
</article>
